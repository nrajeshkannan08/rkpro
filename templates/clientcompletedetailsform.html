<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Complete Details Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f5f7fa;
        }
        .card{
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }
        .form-header{
            background:linear-gradient(135deg,#0d6efd,#000);
            color:white;
            padding:20px;
            border-radius:15px 15px 0 0;
        }
        .required{
            color:red;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">

    <div class="card">

        <div class="form-header">
            <h2 class="text-center">Client Complete Details Form</h2>
        </div>

        <div class="card-body">

            <form action="/submit" method="POST" enctype="multipart/form-data">

                <h5 class="mb-3 text-primary">Personal Information</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Client Name <span class="required">*</span></label>
                        <input type="text" class="form-control" name="client_name" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Company Name</label>
                        <input type="text" class="form-control" name="company_name">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Email Address</label>
                        <input type="email" class="form-control" name="email">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Mobile Number</label>
                        <input type="tel" class="form-control" name="mobile">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Alternate Number</label>
                        <input type="tel" class="form-control" name="alternate_mobile">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Website</label>
                        <input type="url" class="form-control" name="website">
                    </div>
                </div>

                <hr>

                <h5 class="mb-3 text-primary">Address Information</h5>

                <div class="mb-3">
                    <label>Address</label>
                    <textarea class="form-control" rows="3" name="address"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>City</label>
                        <input type="text" class="form-control" name="city">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>State</label>
                        <input type="text" class="form-control" name="state">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Pincode</label>
                        <input type="text" class="form-control" name="pincode">
                    </div>
                </div>

                <hr>

                <h5 class="mb-3 text-primary">Project Details</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Project Name</label>
                        <input type="text" class="form-control" name="project_name">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Project Type</label>
                        <select class="form-select" name="project_type">
                            <option value="">Select</option>
                            <option>Website Development</option>
                            <option>Mobile Application</option>
                            <option>Software Development</option>
                            <option>Digital Marketing</option>
                            <option>SEO</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Project Description</label>
                    <textarea class="form-control" rows="4" name="project_description"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Budget</label>
                        <input type="number" class="form-control" name="budget">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Expected Delivery Date</label>
                        <input type="date" class="form-control" name="delivery_date">
                    </div>
                </div>

                <hr>

                <h5 class="mb-3 text-primary">Additional Information</h5>

                <div class="mb-3">
                    <label>Notes</label>
                    <textarea class="form-control" rows="4" name="notes"></textarea>
                </div>

                  <!-- Resume Upload -->

                    <h4 class="mt-4 mb-3 text-primary">
                        project_complete_details Upload
                    </h4>

                    <div class="col-md-12 mb-3">
                        <label>Upload project_complete_details (PDF/DOC)</label>
                        <input type="file"
                               name="project_complete_details"
                               class="form-control"
                               required>
                    </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-5">
                        Save Client Details
                    </button>

                    <button type="reset" class="btn btn-secondary px-5">
                        Reset
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
<script src="{{ url_for('static', filename='js/client-form.js') }}"></script>

<script>
window.addEventListener("scroll", function () {

    document.querySelectorAll(".reveal").forEach(function (el) {

        let top = el.getBoundingClientRect().top;

        if (top < window.innerHeight - 100) {
            el.classList.add("active");
        }
    });
});
</script>


</body>
</html>
