{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>Client Requirements</h2>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Company</th>
                <th>Email</th>
                <th>Project</th>
                <th>Budget</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>

        {% for c in clients %}

            <tr>
                <td>{{ c[0] }}</td>
                <td>{{ c[1] }}</td>
                <td>{{ c[2] }}</td>
                <td>{{ c[3] }}</td>
                <td>{{ c[6] }}</td>
                <td>{{ c[14] }}</td>
                <td>{{ c[19] }}</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
